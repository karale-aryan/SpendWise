services:
  - type: web
    name: spendwise
    env: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/spendwise-1.0.0.jar
    plan: starter
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
